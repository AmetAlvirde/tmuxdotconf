# =============================================================================
# RELOAD & ENTRYPOINT
# =============================================================================
unbind r
bind r source-file ~/.config/tmux/tmux.conf\; display-message "tmux.conf reloaded"

# =============================================================================
# CORE OPTIONS
# =============================================================================
set -g prefix C-Space
set -g mouse on
set -g base-index 1
set -g renumber-windows on
set -g status-position top
set -sg escape-time 0
set -g history-limit 100000

# =============================================================================
# PANE & WINDOW BEHAVIOR
# =============================================================================
bind \\ split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'
bind c new-window -c '#{pane_current_path}'
bind-key b break-pane -d

# =============================================================================
# NAVIGATION & RESIZE BINDINGS
# =============================================================================
bind -n C-Left resize-pane -L 5
bind -n C-Down resize-pane -D 5
bind -n C-Up resize-pane -U 5
bind -n C-Right resize-pane -R 5
bind-key C-j choose-tree

# =============================================================================
# TERMINAL & EVENTS
# =============================================================================
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g focus-events on

# =============================================================================
# THEME SWITCHER & HOOKS
# =============================================================================
run-shell "~/.config/tmux/theme-switcher.sh"
set-hook -g after-new-window 'run-shell "~/.config/tmux/theme-switcher.sh"'
set-hook -g after-split-window 'run-shell "~/.config/tmux/theme-switcher.sh"'
set-hook -g pane-exited 'run-shell "~/.config/tmux/theme-switcher.sh"'
set-hook -g client-focus-in 'run-shell "~/.config/tmux/theme-switcher.sh"'
bind T run-shell "TMUX_THEME_FORCE=1 ~/.config/tmux/theme-switcher.sh" \; display-message "Theme refreshed"

# =============================================================================
# COPY MODE
# =============================================================================
setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel
bind-key -T copy-mode-vi 'r' send -X rectangle-toggle

# =============================================================================
# PLUGINS
# =============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Initialize TPM (keep this at the very bottom)
run '~/.config/tmux/plugins/tpm/tpm'
