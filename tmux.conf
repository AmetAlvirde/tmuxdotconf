unbind r
bind r source-file ~/.config/tmux/tmux.conf\; display-message "tmux.conf reloaded"

set -g prefix C-Space

set -g mouse on

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g base-index 1
set -g renumber-windows on
set -g status-position top

# Makes vim, nvim and emacs faster within tmux
set -sg escape-time 0

# Store a lot of history
set -g history-limit 100000

# Splits pane vertically with the current path
bind \\ split-window -h -c '#{pane_current_path}'

# Splits pane horizontally with the current path
bind - split-window -v -c '#{pane_current_path}'

# Creates new windows with the current path
bind c new-window -c '#{pane_current_path}'

# Breaks a pane to another window
bind-key b break-pane -d

# Use arrow keys for resizing panes
bind -n C-Left resize-pane -L 5
bind -n C-Down resize-pane -D 5
bind -n C-Up resize-pane -U 5
bind -n C-Right resize-pane -R 5

# Choose window with visual indicator
bind-key C-j choose-tree

# Color support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

set -g focus-events on

# =============================================================================
# AUTOMATIC THEME SWITCHING
# =============================================================================
# Load the appropriate theme based on macOS appearance
run-shell "~/.config/tmux/theme-switcher.sh"

# Auto-refresh theme when creating/closing windows or panes
set-hook -g after-new-window 'run-shell "~/.config/tmux/theme-switcher.sh"'
set-hook -g after-split-window 'run-shell "~/.config/tmux/theme-switcher.sh"'
set-hook -g pane-exited 'run-shell "~/.config/tmux/theme-switcher.sh"'

# Auto-refresh when tmux window gets focus (works when switching back from other apps)
set-hook -g client-focus-in 'run-shell "~/.config/tmux/theme-switcher.sh"'


# Use vim keybindings in copy mode
setw -g mode-keys vi

# Optional: Additional vim-style bindings for copy mode
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel
bind-key -T copy-mode-vi 'r' send -X rectangle-toggle


# Manual theme refresh keybinding (prefix + T)
# Use this after changing macOS appearance if tmux doesn't update automatically
bind T run-shell "~/.config/tmux/theme-switcher.sh" \; display-message "Theme refreshed"

# Initialize TPM (keep this at the very bottom)
run '~/.config/tmux/plugins/tpm/tpm'


