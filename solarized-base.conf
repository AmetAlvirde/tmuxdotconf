# Solarized shared theme layout for tmux

# Status bar
set -g status-style "bg=$theme_status_bg,fg=$theme_status_fg"
set -g status-left-length 50
set -g status-right-length 80

# Left side: session name
set -g status-left "#[bg=$theme_accent,fg=$theme_active_fg,bold] #S #[bg=$theme_status_bg,fg=$theme_accent,nobold]"

# Right side: user, host, date/time
set -g status-right "#[fg=$theme_accent]#[bg=$theme_accent,fg=$theme_active_fg,bold] #(whoami) #[bg=$theme_status_bg]#[fg=$theme_accent]#[bg=$theme_accent,fg=$theme_active_fg,bold] #H #[bg=$theme_status_bg]#[fg=$theme_accent]#[bg=$theme_accent,fg=$theme_active_fg,bold] %Y-%m-%d %H:%M #[bg=$theme_status_bg]"

# Window status (inactive)
set -g window-status-format "#[fg=$theme_window_inactive_fg,bg=$theme_status_bg] #I:#W#F "

# Window status (active)
set -g window-status-current-format "#[bg=$theme_window_active_bg,fg=$theme_active_fg,bold] #I:#W#F #[bg=$theme_status_bg,fg=$theme_window_active_bg,nobold]"

# Pane borders
set -g pane-border-style "fg=$theme_pane_border_fg"
set -g pane-active-border-style "fg=$theme_pane_active_border_fg"

# Pane number display
set -g display-panes-colour "$theme_pane_border_fg"
set -g display-panes-active-colour "$theme_pane_active_border_fg"

# Messages and command line
set -g message-style "bg=$theme_message_bg,fg=$theme_message_fg"
set -g message-command-style "bg=$theme_message_bg,fg=$theme_message_fg"

# Window modes (copy mode, etc.)
set -g mode-style "bg=$theme_message_bg,fg=$theme_message_fg"

# Clock mode
set -g clock-mode-colour "$theme_clock_fg"
