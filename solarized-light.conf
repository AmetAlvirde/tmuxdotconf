# Solarized Light Theme for tmux
# Using custom OKLCH color values

# =============================================================================
# COLOR DEFINITIONS
# =============================================================================
# Base colors
base03="#002d38"    # darkest background
base02="#093946"    # dark background highlights
base01="#5b7279"    # dark foreground secondary
base00="#657377"    # light foreground secondary
base0="#98a8a8"     # light foreground primary
base1="#8faaab"     # dark foreground primary
base2="#f1e9d2"     # light background highlights
base3="#fbf7ef"     # lightest background

# Accent colors
yellow="#ac8300"
orange="#d56500"
red="#f23749"
magenta="#dd459d"
violet="#7d80d1"
blue="#2b90d8"
cyan="#259d94"
green="#819500"

# =============================================================================
# STATUS BAR
# =============================================================================
set -g status-style "bg=$base2,fg=$base00"
set -g status-left-length 50
set -g status-right-length 80

# Left side: session name
set -g status-left "#[bg=$yellow,fg=$base3,bold] #S #[bg=$base2,fg=$yellow,nobold]"

# Right side: user, host, date/time
set -g status-right "#[fg=$yellow]#[bg=$yellow,fg=$base3,bold] #(whoami) #[bg=$base2]#[fg=$yellow]#[bg=$yellow,fg=$base3,bold] #H #[bg=$base2]#[fg=$yellow]#[bg=$yellow,fg=$base3,bold] %Y-%m-%d %H:%M #[bg=$base2]"

# Window status (inactive)
set -g window-status-format "#[fg=$base00,bg=$base2] #I:#W#F "

# Window status (active)
set -g window-status-current-format "#[bg=$green,fg=$base3,bold] #I:#W#F #[bg=$base2,fg=$green,nobold]"

# =============================================================================
# PANE BORDERS
# =============================================================================
set -g pane-border-style "fg=$base1"
set -g pane-active-border-style "fg=$blue"

# Pane number display
set -g display-panes-colour "$base1"
set -g display-panes-active-colour "$blue"

# =============================================================================
# MESSAGES & COMMAND LINE
# =============================================================================
set -g message-style "bg=$base1,fg=$base3"
set -g message-command-style "bg=$base1,fg=$base3"

# =============================================================================
# WINDOW MODES (copy mode, etc.)
# =============================================================================
set -g mode-style "bg=$base1,fg=$base3"

# =============================================================================
# CLOCK MODE
# =============================================================================
set -g clock-mode-colour "$blue"
