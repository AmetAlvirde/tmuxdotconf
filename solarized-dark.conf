# Solarized Dark Theme for tmux
# Using custom OKLCH color values

# =============================================================================
# COLOR DEFINITIONS
# =============================================================================
# Base colors
base03="#002d38"    # darkest background
base02="#093946"    # dark background highlights
base01="#5b7279"    # dark foreground secondary
base00="#657377"    # light foreground secondary
base0="#98a8a8"     # light foreground primary
base1="#8faaab"     # dark foreground primary
base2="#f1e9d2"     # light background highlights
base3="#fbf7ef"     # lightest background

# Accent colors
yellow="#ac8300"
orange="#d56500"
red="#f23749"
magenta="#dd459d"
violet="#7d80d1"
blue="#2b90d8"
cyan="#259d94"
green="#819500"

# Shared layout roles
theme_status_bg="$base02"
theme_status_fg="$base0"
theme_window_inactive_fg="$base0"
theme_window_active_bg="$green"
theme_active_fg="$base03"
theme_accent="$yellow"
theme_pane_border_fg="$base01"
theme_pane_active_border_fg="$blue"
theme_message_bg="$base01"
theme_message_fg="$base2"
theme_clock_fg="$blue"

source-file ~/.config/tmux/solarized-base.conf
